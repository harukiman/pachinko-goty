<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>激熱デジパチ - CR フレンズ伝説</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=M+PLUS+Rounded+1c:wght@400;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- 軍資金バー（FIRE目標進捗） -->
  <div id="bankroll">
    <div class="bk-row">
      <div class="bk-item"><span>軍資金</span><b id="bk-money">¥0</b></div>
      <div class="bk-item"><span>持玉価値</span><b id="bk-value">¥0</b></div>
      <div class="bk-item"><span>収支</span><b id="bk-profit">¥0</b></div>
    </div>
    <div id="fire-goal">
      <div class="fg-label">🌅 FIRE目標 1億円　<span id="fg-pct">0%</span><span id="fg-detail"></span></div>
      <div class="fg-bar"><span id="fg-fill"></span><i class="fg-mark" style="left:50%"></i><i class="fg-mark" style="left:100%"></i></div>
    </div>
  </div>

  <!-- 実機データカウンター（台上部の表示機を模す） -->
  <div id="data-counter">
    <div class="dc-cells">
      <div class="dc-cell"><span class="dc-label">大当り</span><b id="dc-bighits">0</b><span class="dc-unit">回</span></div>
      <div class="dc-cell"><span class="dc-label">確変</span><b id="dc-kakuhen">0</b><span class="dc-unit">回</span></div>
      <div class="dc-cell"><span class="dc-label">最高連</span><b id="dc-maxren">0</b><span class="dc-unit">連</span></div>
      <div class="dc-cell"><span class="dc-label">回転数</span><b id="dc-spins">0</b></div>
      <div class="dc-cell hamari"><span class="dc-label">ハマり</span><b id="dc-since">0</b></div>
    </div>
    <div class="dc-prob">合成確率 <b id="dc-prob">1/---</b></div>
    <canvas id="slump" width="360" height="84" aria-label="スランプグラフ"></canvas>
  </div>

  <div id="cabinet">
  <div id="lamp-bar"><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
  <div id="machine">
    <!-- ヘッダー -->
    <header id="topbar">
      <div class="title">CR フレンズ伝説 <span class="sub">〜50年後の君へ〜</span></div>
      <div class="stat-line">
        <span>持玉 <b id="balls">0</b></span>
        <span>差玉 <b id="diff">0</b></span>
        <span>連 <b id="renchan">0</b></span>
        <span id="state-badge" class="badge">通常</span>
      </div>
    </header>

    <!-- 液晶画面 -->
    <section id="screen">
      <!-- 右打ち指示（電サポ中・液晶右上） -->
      <div id="migiuchi" class="hidden">右打ち <span class="arrow">➡</span></div>
      <div id="reels">
        <div class="reel" data-i="0"><img alt="reel0"></div>
        <div class="reel" data-i="1"><img alt="reel1"></div>
        <div class="reel" data-i="2"><img alt="reel2"></div>
      </div>

      <!-- 演出オーバーレイ群 -->
      <div id="fx-flash" class="fx"></div>
      <div id="fx-swarm" class="fx"></div>
      <div id="fx-cutin" class="fx"><img alt="cutin"><div class="cutin-label"></div></div>
      <div id="fx-su" class="fx"><div class="su-text"></div></div>
      <div id="fx-reach" class="fx"><div class="reach-text"></div></div>
      <div id="fx-telop" class="fx"><div class="telop-text"></div></div>
      <div id="fx-button" class="fx"><div class="push-btn">PUSH!</div><div class="push-ring"></div></div>
      <div id="fx-kakutei" class="fx"><div class="kakutei-text">大当り確定!!</div></div>
      <div id="fx-vflash" class="fx"><div class="v-text">V</div></div>
      <div id="fx-round" class="fx"><div class="round-head"></div><div class="round-pips"></div><div class="round-payout"></div></div>
      <div id="fx-result" class="fx"><div class="result-text"></div></div>
      <div id="fx-confetti" class="fx"></div>

      <!-- シネマ（ストーリー/ムービー） -->
      <div id="cinema" class="fx">
        <div class="cine-bg"></div>
        <div class="cine-fxlayer"></div>
        <div class="cine-bars"></div>
        <img class="cine-char" alt="">
        <div class="cine-title"></div>
        <div class="cine-box"><span class="cine-name"></span><span class="cine-text"></span></div>
        <div class="cine-skip">タップでスキップ ▶▶</div>
      </div>

      <div id="fx-message" class="msg"></div>
    </section>

    <!-- 保留 -->
    <div id="holds">
      <span id="hold-current" class="hold-current" title="変動中"></span>
      <span class="hold-label">保留</span>
      <span class="hold-slot" data-i="0"></span>
      <span class="hold-slot" data-i="1"></span>
      <span class="hold-slot" data-i="2"></span>
      <span class="hold-slot" data-i="3"></span>
    </div>

    <!-- 玉レーン（簡易演出）-->
    <canvas id="lane" width="320" height="90"></canvas>

    <!-- 打ち分け（左/右打ち） -->
    <div id="uchi">
      <button id="uchi-left" class="uchi-btn active">左打ち</button>
      <button id="uchi-right" class="uchi-btn">右打ち</button>
    </div>

    <!-- 操作 -->
    <div id="controls">
      <button id="fire" class="big-btn">🔼 発射（長押し）</button>
      <button id="auto" class="toggle-btn">オート OFF</button>
    </div>

    <!-- 玉貸・換金・バイト -->
    <div id="shop">
      <label class="rate-label">レート
        <select id="rate-select"></select>
      </label>
      <label class="rate-label">倍速
        <select id="speed-select"></select>
      </label>
    </div>
    <div id="shop2">
      <button id="lend" class="shop-btn lend">玉貸</button>
      <button id="cashout" class="shop-btn">換金</button>
      <button id="bait" class="shop-btn bait">💼 バイト</button>
    </div>

    <!-- 設定・情報 -->
    <div id="panel">
      <div class="row">
        <label>スペック
          <select id="spec-select"></select>
        </label>
        <label class="vol">音量
          <input id="volume" type="range" min="0" max="1" step="0.05" value="0.6">
        </label>
        <button id="mute" class="toggle-btn">🔊</button>
      </div>
      <div class="row">
        <button id="toggle-story" class="toggle-btn active">🎬 ムービー ON</button>
        <button id="toggle-fastprod" class="toggle-btn">⏩ 演出も倍速 OFF</button>
        <button id="achievements" class="toggle-btn">🏆 実績</button>
      </div>
      <div class="row">
        <button id="replay-op" class="toggle-btn">OP再生</button>
        <button id="replay-tut" class="toggle-btn">遊び方</button>
        <button id="data-delete" class="toggle-btn danger">🗑 データ削除</button>
      </div>
      <div id="reliability" class="info"></div>
    </div>
  </div><!-- /#machine -->
  </div><!-- /#cabinet -->

  <!-- バイト（ミニゲーム）モーダル -->
  <div id="minigame" class="modal hidden">
    <div class="mg-panel">
      <div class="mg-header"><span class="mg-title">💼 バイト</span><button class="mg-close">✕</button></div>
      <div class="mg-body"></div>
    </div>
  </div>

  <!-- 実績モーダル -->
  <div id="ach-modal" class="modal hidden">
    <div class="mg-panel">
      <div class="mg-header"><span class="mg-title">🏆 実績</span><button id="ach-close" class="mg-close">✕</button></div>
      <div id="ach-body" class="mg-body"></div>
    </div>
  </div>

  <!-- チュートリアル -->
  <div id="tutorial" class="modal hidden">
    <div class="mg-panel">
      <div class="mg-header"><span class="mg-title">🎯 遊び方</span><button id="tut-close" class="mg-close">✕</button></div>
      <div id="tut-body" class="mg-body"></div>
    </div>
  </div>

  <!-- 実績トースト -->
  <div id="toast-wrap"></div>

  <!-- 読み込み順序が依存関係 -->
  <script src="js/config.js"></script>
  <script src="js/assets.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/rng.js"></script>
  <script src="js/reels.js"></script>
  <script src="js/story.js"></script>
  <script src="js/cinema.js"></script>
  <script src="js/minigames.js"></script>
  <script src="js/production.js"></script>
  <script src="js/game.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
