<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="flame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff7c2"/><stop offset="40%" stop-color="#ffd23b"/><stop offset="75%" stop-color="#ff6a00"/><stop offset="100%" stop-color="#ff2a2a"/>
    </linearGradient>
    <linearGradient id="cool" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffd23b"/><stop offset="50%" stop-color="#ff6ec7"/><stop offset="100%" stop-color="#3af0ff"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <g font-family="'Arial Black',Impact,sans-serif" font-weight="900" text-anchor="middle" filter="url(#glow)">
    <text x="400" y="170" font-size="150" fill="url(#flame)" stroke="#3a1500" stroke-width="4" font-style="italic">FORTUNE</text>
    <text x="400" y="300" font-size="150" fill="url(#flame)" stroke="#3a1500" stroke-width="4" font-style="italic">FIRE</text>
  </g>
  <text x="400" y="345" font-family="sans-serif" font-size="30" font-weight="700" text-anchor="middle" fill="url(#cool)">〜 200円から世界の頂点へ 〜</text>
</svg>
